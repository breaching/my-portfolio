<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18181B"/>
      <stop offset="100%" stop-color="#09090B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="#27272A" stroke-width="3"/>
  <!-- Accent line top -->
  <rect x="80" y="68" width="352" height="3" rx="1.5" fill="url(#accent)" opacity="0.6"/>
  <!-- Terminal dots -->
  <circle cx="108" cy="52" r="8" fill="#EF4444" opacity="0.8"/>
  <circle cx="136" cy="52" r="8" fill="#EAB308" opacity="0.8"/>
  <circle cx="164" cy="52" r="8" fill="#22C55E" opacity="0.8"/>
  <!-- "AD" text in monospace style -->
  <text x="256" y="330" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="220" font-weight="700" fill="#F5F5F5" text-anchor="middle" letter-spacing="-8">AD</text>
  <!-- Accent underline -->
  <rect x="112" y="360" width="288" height="4" rx="2" fill="url(#accent)"/>
  <!-- Cursor blink -->
  <rect x="388" y="180" width="4" height="160" rx="2" fill="url(#accent)" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
